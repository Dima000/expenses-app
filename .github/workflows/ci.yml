name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # The Firestore/Functions emulators require a JVM.
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install dependencies
        run: npm ci

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Build shared + functions
        run: |
          npm run build:shared
          npm run build:functions

      - name: Build web app
        run: npm run build:web

      - name: Domain unit tests
        run: npm run test:domain

      - name: Firestore rules tests (emulator)
        run: npm run test:rules

      # The REST test reads the secret from functions/.secret.local (gitignored),
      # the same file the emulator loads — provision a throwaway value for CI.
      - name: Provision local secret for REST test
        run: echo "SPENDING_REST_SECRET=ci-throwaway-secret" > functions/.secret.local

      - name: REST endpoint tests (emulator)
        run: npm run test:rest
