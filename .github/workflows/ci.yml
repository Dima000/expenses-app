name: CI

# Runs on PRs and on merges to main. Kept lean on purpose: install, build
# (which typechecks), and the fast domain unit tests — no JVM/emulator setup.
# The Firebase emulator suites run locally: `npm run test:rules` / `test:rest`.
on:
  push:
    branches: [main]
  pull_request:

# Least-privilege default token: this workflow only reads the repo to build
# and run tests. Restrict the GITHUB_TOKEN accordingly (see code-scanning).
permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - name: Build (typechecks shared, functions, web)
        run: |
          npm run build:shared
          npm run build:functions
          npm run build:web

      - name: Domain unit tests
        run: npm run test:domain
